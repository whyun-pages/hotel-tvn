# 云原生构建配置 (https://cnb.cool/)
# 实现与 .github/workflows/schedule.yml 相同的功能：每日更新 live 文件并提交
resources:
  cpu: 1
  memory: 2Gi

# 共用流水线模板（锚点复用）
.update_live_pipeline: &update_live_pipeline
  docker:
    image: node:22
  env:
    USE_LOCAL_URLS: "true"
  imports:
    # 引用密钥仓库中的特定文件
    - https://cnb.cool/whyun-pages/secrets/-/blob/main/cf.yml
  stages:
    - name: install-pnpm
      script: |
        corepack enable
        corepack prepare pnpm@10 --activate
        pnpm --version
    - name: install-deps
      script: pnpm install
    - name: build
      script: pnpm build
    - name: generate-live-files
      script: pnpm start:prod
      timeout: 3h
    - name: upload to Cloudflare Pages
      script: |
        # 使用 npx 直接运行 wrangler 部署命令
        # --dir 指定你的静态产物目录
        # --project-name 指定你的项目名
        mkdir -p output
        cp lives.txt lives.m3u output/
        npx wrangler pages deploy ./output \
          --project-name="hotel-tvn" \
          --branch="main"
      env:
        # 这里的变量会自动从 CNB 环境变量中读取
        CLOUDFLARE_API_TOKEN: $CLOUDFLARE_API_TOKEN
        CLOUDFLARE_ACCOUNT_ID: $CLOUDFLARE_ACCOUNT_ID

main:
  # 定时任务：每天 8:00 (Asia/Shanghai)，对应原 schedule 的 cron UTC 0:00
  "crontab: 0 8 * * *":
    - name: update-live-files
      <<: *update_live_pipeline

  # 手动触发：在 CNB 页面「手动触发构建」选择 web_trigger_schedule
  web_trigger_schedule:
    - name: update-live-files-manual
      <<: *update_live_pipeline
