# 云原生构建配置 (https://cnb.cool/)
# 实现与 .github/workflows/schedule.yml 相同的功能：每日更新 live 文件并提交
resources:
  cpu: 1
  memory: 2Gi

# 共用流水线模板（锚点复用）
.update_live_pipeline: &update_live_pipeline
  docker:
    image: node:22
  runner:
    # 指定在 amd64 架构构建节点上执行
    tags: cnb:arch:amd64
    cpus: 1
  imports:
    # 引用密钥仓库中的特定文件
    - https://cnb.cool/whyun-pages/secrets/-/blob/main/cf.yml
  stages:
    - name: install-pnpm
      script: |
        corepack enable
        corepack prepare pnpm@10 --activate
        pnpm --version
    - name: install-deps
      script: pnpm install
    - name: build
      script: pnpm build
    - name: generate-live-files
      script: pnpm start:prod
      timeout: 3h
    - name: upload to Cloudflare Pages
      script: |
        # 确保 import 的 cf.yml 中的密钥已注入（不要在此 stage 用 env 再写一遍，否则可能被当成字面量）
        if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
          echo "错误: CLOUDFLARE_ACCOUNT_ID 未设置，请检查密钥仓库 cf.yml 是否包含该键并已被 CNB imports 注入"
          exit 1
        fi
        if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
          echo "错误: CLOUDFLARE_API_TOKEN 未设置"
          exit 1
        fi
        mkdir -p output
        cp lives.txt lives.m3u channels.json output/
        ./.cnb/upload.sh
        

main:
  # 定时任务：每天 8:00 (Asia/Shanghai)，对应原 schedule 的 cron UTC 0:00
  "crontab: 0 8 * * *":
    - name: update-live-files
      <<: *update_live_pipeline

  # 手动触发：在 CNB 页面「手动触发构建」选择 web_trigger_schedule
  web_trigger_schedule:
    - name: update-live-files-manual
      <<: *update_live_pipeline
